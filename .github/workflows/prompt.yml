name: prompt

# Tests the interactive zsh prompt (powerlevel10k + zinit). Triggers only
# when something that can affect the prompt actually changes, so unrelated
# PRs don't get spammed with a render-comment.
#
# All real work lives in test/tests.d/3*-prompt-*.sh. To reproduce locally:
#
#   bash test/in-sandbox.sh
#   SANDBOX=$(ls -td test/sandbox-* | head -1)
#   HOME="$SANDBOX" DOTFILES_TEST_LOG_DIR="$SANDBOX/test-logs" \
#     bash "$SANDBOX/test/run.sh"
#   cat "$SANDBOX/test-logs/prompt-report.md"

on:
  pull_request:
    paths:
      - '.zshrc'
      - '.zshenv'
      - '.profile'
      - '.p10k.zsh'
      - '.config/shell/**'
      - 'bin/setup-dotfiles.sh'
      - 'test/lib.sh'
      - 'test/run.sh'
      - 'test/in-sandbox.sh'
      - 'test/prompt/**'
      - 'test/tests.d/**'
      - '.github/workflows/prompt.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  prompt-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # GH Actions runners inherit TERM from the agent process, which has no
      # controlling terminal. That commonly arrives as `TERM=dumb` (or unset)
      # in the run step, which makes zinit's color-message registry fail to
      # initialize -- causing literal `{rst}` placeholders in output, doubled
      # snippet paths (OMZP::name/OMZP::name), and a degraded p10k render
      # with no vcs segment. Setting a real terminfo entry here gives the
      # whole step a usable TERM and prevents that cascade.
      TERM: xterm-256color

    steps:
      - uses: actions/checkout@v4

      - name: Install zsh + perl + rsync + zinit's download deps
        run: |
          sudo apt-get update
          # zinit's plugin/snippet downloader tries curl, then wget, then
          # lftp -- and p10k's gitstatusd binary is fetched the same way.
          # If wget is missing, zinit's fallback chain can leave it in a
          # half-installed state where snippet paths exist but binaries
          # don't, and p10k renders a degraded prompt with no vcs segment.
          # All three (curl + wget + git) need to be available.
          sudo apt-get install -y --no-install-recommends \
            zsh perl rsync curl wget ca-certificates git bsdmainutils

      - name: Diagnose terminal env
        # One-time visibility into the runtime conditions that have been
        # confusing this workflow. If a future run misbehaves, the answers
        # to these four questions usually disambiguate the cause.
        run: |
          echo "TERM=${TERM:-<unset>}"
          echo "stdin is tty? $([ -t 0 ] && echo yes || echo no)"
          echo "stdout is tty? $([ -t 1 ] && echo yes || echo no)"
          locale 2>/dev/null || true
          ls -la /proc/self/fd/0 || true
          command -v script && script --version | head -1

      - name: Run sandbox + tests
        id: tests
        run: |
          set -euo pipefail
          bash test/in-sandbox.sh
          SANDBOX=$(ls -td test/sandbox-* | head -1)
          if [ -z "$SANDBOX" ] || [ ! -d "$SANDBOX" ]; then
            echo "no sandbox directory found" >&2
            exit 1
          fi
          echo "sandbox=$SANDBOX" >>"$GITHUB_OUTPUT"
          export DOTFILES_TEST_LOG_DIR="$SANDBOX/test-logs"
          mkdir -p "$DOTFILES_TEST_LOG_DIR"

          # umask 022 + chmod -R go-w: keep compinit's "insecure dirs"
          # audit from prompting. zinit clones its plugins during the first
          # interactive zsh; new dirs inherit whatever umask CI started us
          # with. 022 makes every new dir 0755 (no group write). chmod is
          # belt-and-suspenders for anything already on disk.
          umask 022
          chmod -R go-w "$SANDBOX" 2>/dev/null || true

          # CI runners can still make compaudit unhappy via parent directory
          # permissions outside the sandbox. If compinit prompts during this
          # non-interactive warmup, EOF answers abort and leaves zinit's
          # deferred snippet resolver in a poisoned state. Patch only the
          # disposable sandbox copy so CI skips compaudit without changing the
          # checked-in interactive shell behavior.
          perl -0pi -e 's/atload"zicompinit; zicdreplay"/atload"zicompinit -u; zicdreplay"/g' "$SANDBOX/.zshrc"
          if ! grep -q 'zicompinit -u; zicdreplay' "$SANDBOX/.zshrc"; then
            echo "failed to patch sandbox .zshrc for non-interactive compinit" >&2
            exit 1
          fi

          # PTY-backed warmup. Run interactive zsh under `script` (util-linux)
          # for 60s -- enough to let zinit's first-run install, deferred
          # `wait lucid` queue, compinit/zicdreplay, and p10k's gitstatusd
          # download all complete in a fully terminal-equipped session.
          # Tests that follow then operate against a quiescent sandbox.
          # Output captured to a log; only surfaced if the warmup fails.
          warmup_log="$SANDBOX/warmup.log"
          if ! HOME="$SANDBOX" timeout 120 \
              script -qec 'zsh -i -c "sleep 60; exit"' /dev/null \
              </dev/null >"$warmup_log" 2>&1; then
            echo "warmup did not complete cleanly (continuing); tail of log:" >&2
            tail -50 "$warmup_log" >&2 || true
          fi

          HOME="$SANDBOX" bash "$SANDBOX/test/run.sh"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-test-logs
          path: ${{ steps.tests.outputs.sandbox }}/test-logs/
          if-no-files-found: warn

      - name: Post or update PR comment
        # Always attempt the comment, even when tests failed. The rendered
        # prompt is the most useful debugging signal when something broke,
        # and the report is written before assertions run. `continue-on-
        # error` keeps a missing report (e.g. test crashed before the render
        # step) from masking the underlying test failure.
        if: ${{ !cancelled() && github.event_name == 'pull_request' && steps.tests.outputs.sandbox != '' }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: prompt-render
          path: ${{ steps.tests.outputs.sandbox }}/test-logs/prompt-report.md
