# Requires tmux 3.1+ for XDG config discovery

# ─── Plugin manager location (XDG data dir) ──────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

# ─── Bootstrap tpm + resurrect state dir on first run ────────────────────
if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'mkdir -p ~/.local/state/tmux/resurrect && git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"

# ─── Sensible defaults ───────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Plugins ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ─── Plugin config ───────────────────────────────────────────────────────
set -g @resurrect-dir '~/.local/state/tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ─── Status bar (shows prefix indicator) ─────────────────────────────────
set -g status-right '#{prefix_highlight} | %a %h-%d %H:%M '

# ─── Initialize tpm (keep at very bottom) ────────────────────────────────
run '~/.local/share/tmux/plugins/tpm/tpm'
